<section class="intro-strip">
  <p class="intro-text">Notes on building Smelloff, design, and whatever I'm figuring out.</p>
  <div class="author-chip">
    <span class="author-avatar" aria-hidden="true">B</span>
    <span>By <strong>Brainee</strong> &middot; Hyderabad</span>
  </div>
</section>

<section class="writing-section">
  <div class="section-label">WRITING</div>
  {{posts_list}}
</section>

<section class="topics-section">
  <div class="section-label">TOPICS</div>
  <div class="topics-strip">
    {{topics_strip}}
  </div>
</section>

<section class="newsletter-block home-newsletter">
  <div class="newsletter-inner">
    <h2 class="newsletter-heading">Stay in the loop</h2>
    <p class="newsletter-sub">Get new posts in your inbox. No spam. Unsubscribe whenever.</p>
    <form class="newsletter-form" action="https://buttondown.email/api/emails/embed-subscribe/doddy" method="post" target="_blank">
      <input type="email" name="email" placeholder="you@example.com" required class="newsletter-input" aria-label="Email address">
      <button type="submit" class="newsletter-btn">Subscribe</button>
    </form>
  </div>
</section>
