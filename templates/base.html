<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{page_title}}</title>
  <meta name="description" content="{{meta_description}}">
  <link rel="canonical" href="{{canonical}}">
  <meta property="og:type" content="{{og_type}}">
  <meta property="og:title" content="{{og_title}}">
  <meta property="og:description" content="{{og_description}}">
  <meta property="og:image" content="{{og_image}}">
  <meta property="og:url" content="{{og_url}}">
  <meta property="og:site_name" content="Doddy">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{og_title}}">
  <meta name="twitter:description" content="{{og_description}}">
  <meta name="twitter:image" content="{{og_image}}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">

  <link rel="alternate" type="application/rss+xml" title="Doddy RSS" href="/rss.xml">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  {{extra_head}}
</head>
<body class="{{body_class}}">
  <div id="progress-bar" aria-hidden="true"></div>

  <header class="site-header">
    <div class="container nav-wrap">
      <a href="/" class="brand">Doddy</a>
      <nav class="main-nav" aria-label="Main">
        <a href="/" class="nav-link">Home</a>
        <a href="/archive/" class="nav-link">Blog</a>
        <a href="/topics/" class="nav-link">Categories</a>
        <a href="/about/" class="nav-link">About</a>
      </nav>
      <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode"><span class="theme-icon">◐</span></button>
    </div>
  </header>

  <main id="main" class="main-content">{{main_content}}</main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <p class="footer-logo">Doddy</p>
        <p class="footer-note">A premium editorial blog about design, product, and building in public.</p>
      </div>
      <form class="newsletter-form" action="https://buttondown.email/api/emails/embed-subscribe/doddy" method="post" target="_blank">
        <label for="footer-email" class="sr-only">Email address</label>
        <input id="footer-email" class="newsletter-input" type="email" name="email" required placeholder="you@example.com">
        <button class="newsletter-btn" type="submit">Subscribe</button>
      </form>
    </div>
  </footer>

  <script src="/js/main.js" defer></script>
  <script src="/js/search.js" defer></script>
  {{extra_scripts}}
</body>
</html>
