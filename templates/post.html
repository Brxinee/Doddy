<article class="post-article" itemscope itemtype="https://schema.org/BlogPosting">
  <header class="post-header reveal">
    <a href="/topics/{{topic_slug}}/" class="topic-pill">{{topic}}</a>
    <h1 class="post-title" itemprop="headline">{{title}}</h1>
    <p class="post-dek">{{dek}}</p>
    <div class="post-meta">
      <span itemprop="datePublished" content="{{date_iso}}">{{date_formatted}}</span>
      <span>•</span>
      <span class="js-read-time" data-target=".post-body">{{minutes}} min read</span>
    </div>
  </header>

  {{hero_img}}

  <div class="post-body reveal" itemprop="articleBody">
    {{content}}
  </div>

  <div class="post-share reveal" aria-label="Share">
    <a href="https://twitter.com/intent/tweet?url={{canonical}}&text={{title}}" target="_blank" rel="noopener noreferrer" class="share-btn" aria-label="Share on X">X</a>
    <a href="https://www.linkedin.com/sharing/share-offsite/?url={{canonical}}" target="_blank" rel="noopener noreferrer" class="share-btn" aria-label="Share on LinkedIn">in</a>
    <button class="share-btn share-copy" aria-label="Copy link">⧉</button>
  </div>
</article>
